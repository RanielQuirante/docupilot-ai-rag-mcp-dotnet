# =============================================================================
# DocuPilot AI — Phase 1 Docker Compose stack
# =============================================================================
# Six services: docupilot-api, docupilot-worker, docupilot-web, sqlserver,
# qdrant, ollama. All share the default compose bridge network (services
# reach each other by service name, e.g. http://docupilot-api:8080). Stateful
# services use named volumes so data survives `docker compose down` (but is
# removed by `docker compose down -v`).
#
# Usage:
#   copy .env.example .env      # (Windows)  |  cp .env.example .env  (POSIX)
#   docker compose up -d --build
#   docker compose ps
#   docker compose down         # stop, keep volumes
#   docker compose down -v      # stop AND wipe volumes
#
# Ports are overridable via .env (${VAR:-default} syntax) so a developer who
# already runs SQL Server natively on 1433 (etc.) can remap without editing
# this file. See .env.example for the full variable list.
#
# Phase 2 (DA-019): the API now opens a DB connection at startup to apply the
# Documents migration. A `healthcheck:` on `sqlserver` + `depends_on:
# condition: service_healthy` makes the api/worker wait until SQL accepts
# connections (SQL Server needs ~30-60s on a fresh volume). This REDUCES — but
# does not replace — the app-side migrate-retry loop (DA-016); both layers stay.
# A new `docupilot-files` named volume holds uploaded files (mounted on both
# api (writer) and worker (future Phase-3 reader)).
# =============================================================================

services:
  # ---- One-shot: make the docupilot-files volume writable by the app user ----
  # The named volume is created root-owned (0755). The API/Worker run as the
  # non-root user baked into the .NET aspnet/runtime images (UID 1654 = `app`),
  # so they cannot create the date-partition subdirs under /app/files and the
  # upload fails with "Permission denied". This tiny init container chowns the
  # volume root to 1654 ONCE, then exits; api/worker wait for it to complete.
  # Pure config fix — no app/Dockerfile change.
  docupilot-files-init:
    image: busybox:1.37
    command: ["sh", "-c", "chown -R 1654:1654 /app/files && chmod 0775 /app/files"]
    volumes:
      - docupilot-files:/app/files
    restart: "no"

  # ---- .NET 10 Web API (composition root, /health, Swagger) -----------------
  docupilot-api:
    build:
      context: ./backend
      dockerfile: src/DocuPilot.Api/Dockerfile
    image: docupilot-api:dev
    ports:
      - "${API_PORT:-5010}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # In-network DB connection: SQL host = service name `sqlserver`, port 1433
      # (the container-internal port — NOT the host `SQL_PORT`/14330 remap).
      ConnectionStrings__DocuPilotDb: "Server=sqlserver,1433;Database=DocuPilot;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      # File storage: root path points at the docupilot-files volume below.
      FileStorage__RootPath: /app/files
      FileStorage__MaxBytes: "26214400"
      # Phase-3 extraction limits (DA-024). The API reads Extraction__* for
      # validation/limits and surfaces them; Worker__* are Worker-only and not
      # wired here. Defaults come from .env / compose (${VAR:-default}).
      Extraction__TimeoutSeconds: "${EXTRACTION_TIMEOUT_SECONDS:-60}"
      Extraction__MaxAttempts: "${EXTRACTION_MAX_ATTEMPTS:-3}"
      Extraction__MaxTextChars: "${EXTRACTION_MAX_TEXT_CHARS:-5000000}"
      # Phase-4 LLM config (DA-032/DA-036). Wired to BOTH api + worker (env
      # parity): the Worker makes the classification/metadata calls; the API may
      # surface classification limits. BaseUrl = in-network ollama service +
      # container port 11434 (NOT the host OLLAMA_PORT remap). Defaults via .env
      # / compose (${VAR:-default}). Set LLM_MODEL=llama3.2:1b for a cheaper gate.
      Llm__BaseUrl: "${LLM_BASE_URL:-http://ollama:11434}"
      Llm__Model: "${LLM_MODEL:-llama3.2:3b}"
      Llm__ApiStyle: "${LLM_API_STYLE:-ollama-native}"
      Llm__TimeoutSeconds: "${LLM_TIMEOUT_SECONDS:-120}"
      Llm__MaxAttempts: "${LLM_MAX_ATTEMPTS:-2}"
      Llm__MaxInputChars: "${LLM_MAX_INPUT_CHARS:-12000}"
      Llm__Temperature: "${LLM_TEMPERATURE:-0}"
    volumes:
      - docupilot-files:/app/files
    depends_on:
      docupilot-files-init:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---- .NET 10 background worker (document pipeline host; no HTTP) -----------
  docupilot-worker:
    build:
      context: ./backend
      dockerfile: src/DocuPilot.Worker/Dockerfile
    image: docupilot-worker:dev
    environment:
      DOTNET_ENVIRONMENT: Development
      # Worker shares the same DB + file-storage config (Phase-3 reader of the
      # docupilot-files volume; harmless to wire now and keeps env parity).
      ConnectionStrings__DocuPilotDb: "Server=sqlserver,1433;Database=DocuPilot;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      FileStorage__RootPath: /app/files
      FileStorage__MaxBytes: "26214400"
      # Phase-3 pipeline tuning (DA-024). The Worker does the extraction so it
      # reads BOTH Worker__* (poll loop + stale-claim sweep) and Extraction__*
      # (timeout / retry budget / char cap). Defaults via .env / compose.
      Worker__PollIntervalSeconds: "${WORKER_POLL_INTERVAL_SECONDS:-5}"
      Worker__StuckResetMinutes: "${WORKER_STUCK_RESET_MINUTES:-15}"
      Extraction__TimeoutSeconds: "${EXTRACTION_TIMEOUT_SECONDS:-60}"
      Extraction__MaxAttempts: "${EXTRACTION_MAX_ATTEMPTS:-3}"
      Extraction__MaxTextChars: "${EXTRACTION_MAX_TEXT_CHARS:-5000000}"
      # Phase-4 LLM config (DA-032/DA-036). The Worker DOES the classification +
      # metadata LLM calls, so it is the primary consumer; kept identical to the
      # API for env parity. Same ${VAR:-default} pattern + in-network BaseUrl.
      Llm__BaseUrl: "${LLM_BASE_URL:-http://ollama:11434}"
      Llm__Model: "${LLM_MODEL:-llama3.2:3b}"
      Llm__ApiStyle: "${LLM_API_STYLE:-ollama-native}"
      Llm__TimeoutSeconds: "${LLM_TIMEOUT_SECONDS:-120}"
      Llm__MaxAttempts: "${LLM_MAX_ATTEMPTS:-2}"
      Llm__MaxInputChars: "${LLM_MAX_INPUT_CHARS:-12000}"
      Llm__Temperature: "${LLM_TEMPERATURE:-0}"
    volumes:
      - docupilot-files:/app/files
    depends_on:
      docupilot-files-init:
        condition: service_completed_successfully
      sqlserver:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---- Angular 21 SPA served by NGINX (also reverse-proxies /api/*) ---------
  docupilot-web:
    build:
      context: ./frontend/docupilot-web
    image: docupilot-web:dev
    ports:
      - "${WEB_PORT:-4210}:80"
    depends_on:
      - docupilot-api
    restart: unless-stopped

  # ---- SQL Server 2022 (relational metadata store) --------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      # sqlcmd ships at /opt/mssql-tools18/bin in the 2022-latest image; -No
      # disables encryption negotiation (paired with -C trust) for the dev cert.
      # Probes 1433 (container-internal) — independent of the host SQL_PORT remap.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -No -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # ---- Qdrant vector database (HTTP 6333 + gRPC 6334) -----------------------
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # ---- Ollama local LLM runtime (Phase 4: model auto-pulled by init below) --
  # Healthcheck probes the in-container API so dependents can gate on readiness
  # (`condition: service_healthy`). The Ollama image ships `ollama` on PATH but
  # NOT curl/wget, so we probe via `ollama list` (exits 0 once the server's HTTP
  # API answers). Pulled models persist in the ollama-models named volume across
  # `up`/`down` (NOT `down -v`).
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ---- One-shot: pull the LLM model into the ollama-models volume -----------
  # Phase 4 (DA-036). Ollama starts with NO model; the first live classification
  # call would 404 ("model not found"). This init service waits for ollama to be
  # HEALTHY, then `ollama pull ${LLM_MODEL}` (~2 GB for llama3.2:3b) INTO the
  # shared ollama-models volume and exits 0. api/worker gate on it via
  # `condition: service_completed_successfully` so they never call a model-less
  # Ollama. Mirrors the docupilot-files-init pattern. The model persists in the
  # volume, so a later `up` finds it already present and the pull is a fast no-op
  # ("up to date") — it is only re-downloaded after `down -v` wipes the volume.
  # Uses the same ollama/ollama image (already cached) with OLLAMA_HOST pointed
  # at the ollama service, so the CLI talks to that server instead of starting
  # its own. MANUAL fallback if this is skipped:
  #   docker compose exec ollama ollama pull llama3.2:3b
  ollama-model-init:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull \"$${LLM_MODEL:-llama3.2:3b}\""]
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      LLM_MODEL: "${LLM_MODEL:-llama3.2:3b}"
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

# ---- Named volumes for stateful services -----------------------------------
volumes:
  sqlserver-data:
  qdrant-data:
  ollama-models:
  docupilot-files:   # uploaded document files (shared by api + worker)
