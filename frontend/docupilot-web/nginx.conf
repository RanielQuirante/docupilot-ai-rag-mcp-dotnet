# =============================================================================
# docupilot-web — NGINX site config
# =============================================================================
# Dropped into /etc/nginx/conf.d/default.conf by the Dockerfile, replacing
# the upstream default site. The parent nginx.conf shipped in nginx:alpine
# already provides the http {} envelope (mime.types, sendfile, gzip, etc.),
# so this file is a single server {} block — NOT a full nginx.conf.
#
# Routing model
# -------------
#   Browser              → http://localhost:4210
#   docupilot-web        ← serves the Angular SPA from /usr/share/nginx/html
#   /api/*               → reverse-proxy to docupilot-api:8080 inside the
#                          compose network (Docker DNS resolves the service
#                          name). The `/api` PREFIX IS PRESERVED upstream —
#                          see the "Prefix-preservation convention" note below.
#   /api/health          → special-cased: proxied to the upstream ROOT /health
#                          because the API serves health at /health, not
#                          /api/health (see below).
#   anything else        → SPA fallback to index.html so the Angular
#                          router owns client-side routing
#
# Prefix-preservation convention (READ THIS BEFORE EDITING /api/) — DA-022
# -----------------------------------------------------------------------
# NGINX has two distinct behaviours for proxy_pass depending on whether
# the upstream URL ends with a slash:
#
#   location /api/ {
#       proxy_pass http://docupilot-api:8080/;   # ← trailing slash
#   }
#       Browser hits /api/documents
#       Upstream sees /documents          ← WRONG: API routes at /api/documents → 404
#       (NGINX strips the matched location prefix, then appends what's
#        left of the request URI after that prefix.)
#
#   location /api/ {
#       proxy_pass http://docupilot-api:8080;    # ← NO trailing slash
#   }
#       Browser hits /api/documents
#       Upstream sees /api/documents      ← CORRECT: matches [Route("api/documents")]
#       (NGINX appends the full request URI verbatim, prefix intact.)
#
# The DocuPilot API (DA-016) routes ALL document endpoints under
# [Route("api/[controller]")] → /api/documents, /api/documents/upload, etc.
# So the prefix MUST be preserved → NO trailing slash on the /api/ proxy_pass.
#
# The ONE exception is health: the API exposes it at the ROOT /health
# ([Route("health")]), NOT /api/health. With prefix preservation,
# /api/health would forward as /api/health → 404. So we special-case it
# with an exact-match `location = /api/health` block that proxies to the
# upstream root /health, keeping the SPA's health widget green.
#
# Net: /api/documents (and every other /api/... route) reaches the upstream
# WITH the /api prefix, while /api/health is mapped to the root /health.
# Both resolve correctly. (DA-022 — was a trailing-slash prefix-strip that
# 404'd all Phase-2 /api/documents calls; only /api/health worked by luck.)
#
# Upstream hostname
# -----------------
# `docupilot-api` is the service name from code/docker-compose.yml (added
# in DA-007). Inside the compose-default bridge network, Docker DNS
# resolves it to the API container's internal IP. From the host or any
# off-network process, this hostname does NOT resolve — that's expected.
# =============================================================================

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- Health: exact-match to the upstream ROOT /health ----------------
    # The API serves health at /health (root), not /api/health. An exact
    # `location = /api/health` wins over the `/api/` prefix location, and
    # the trailing slash on this proxy_pass rewrites /api/health → /health
    # upstream. Must precede /api/ for clarity (exact match always wins
    # regardless of order, but this keeps the intent obvious). — DA-022
    location = /api/health {
        proxy_pass         http://docupilot-api:8080/health;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_read_timeout    60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_buffering off;
    }

    # ---- Reverse proxy to the API service --------------------------------
    # Must be declared BEFORE the SPA fallback `location /` so it wins for
    # /api/* paths. (NGINX picks the longest matching prefix location, so
    # ordering is technically not significant for prefix matches, but the
    # ordering chosen here matches reader expectation.)
    #
    # NO trailing slash on proxy_pass → the /api prefix is PRESERVED, so
    # /api/documents reaches the upstream as /api/documents, matching the
    # API's [Route("api/[controller]")]. (DA-022 fix.)
    location /api/ {
        proxy_pass         http://docupilot-api:8080;
        proxy_http_version 1.1;

        # Standard reverse-proxy headers so the upstream sees the real
        # client identity rather than the NGINX intermediary.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # Reasonable defaults for an API gateway. Tune in later phases if
        # uploads or long-running operations need a higher ceiling.
        proxy_read_timeout    60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;

        # Disable buffering for streaming-friendly responses (e.g., future
        # SSE / chunked endpoints). Cheap on memory; safe for JSON too.
        proxy_buffering off;
    }

    # ---- Long-cache for hashed static assets -----------------------------
    # Angular's production build emits content-hashed filenames
    # (e.g., main-XYZHASH.js, styles-XYZHASH.css). Those are immutable —
    # tell the browser so. index.html is intentionally NOT covered here
    # and falls through to the `location /` block below which serves it
    # without aggressive caching.
    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|eot|ico|svg|png|jpe?g|gif|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # ---- SPA fallback ----------------------------------------------------
    # The Angular router handles all in-app paths client-side. Any URI
    # that does not match a real file on disk gets index.html, so deep
    # links survive a page reload.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Hardening --------------------------------------------------------
    # Hide the nginx version banner from responses + error pages.
    server_tokens off;
}
