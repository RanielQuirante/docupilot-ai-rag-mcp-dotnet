# =============================================================================
# docupilot-web — NGINX site config
# =============================================================================
# Dropped into /etc/nginx/conf.d/default.conf by the Dockerfile, replacing
# the upstream default site. The parent nginx.conf shipped in nginx:alpine
# already provides the http {} envelope (mime.types, sendfile, gzip, etc.),
# so this file is a single server {} block — NOT a full nginx.conf.
#
# Routing model
# -------------
#   Browser              → http://localhost:4210
#   docupilot-web        ← serves the Angular SPA from /usr/share/nginx/html
#   /api/*               → reverse-proxy to docupilot-api:8080 inside the
#                          compose network (Docker DNS resolves the service
#                          name). The trailing slash on `proxy_pass` strips
#                          the `/api` prefix before forwarding upstream —
#                          see the "Trailing-slash convention" note below.
#   anything else        → SPA fallback to index.html so the Angular
#                          router owns client-side routing
#
# Trailing-slash convention (READ THIS BEFORE EDITING /api/)
# ----------------------------------------------------------
# NGINX has two distinct behaviours for proxy_pass depending on whether
# the upstream URL ends with a slash:
#
#   location /api/ {
#       proxy_pass http://docupilot-api:8080/;   # ← trailing slash
#   }
#       Browser hits /api/health
#       Upstream sees /health
#       (NGINX strips the matched location prefix, then appends what's
#        left of the request URI after that prefix.)
#
#   location /api/ {
#       proxy_pass http://docupilot-api:8080;    # ← NO trailing slash
#   }
#       Browser hits /api/health
#       Upstream sees /api/health
#       (NGINX appends the full request URI verbatim.)
#
# The DocuPilot API routes its health endpoint at the root: /health, NOT
# /api/health. So the trailing-slash form is REQUIRED — without it, every
# request would 404 upstream. If you remove that slash, the live health
# page in the SPA will go red. Don't.
#
# Upstream hostname
# -----------------
# `docupilot-api` is the service name from code/docker-compose.yml (added
# in DA-007). Inside the compose-default bridge network, Docker DNS
# resolves it to the API container's internal IP. From the host or any
# off-network process, this hostname does NOT resolve — that's expected.
# =============================================================================

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- Reverse proxy to the API service --------------------------------
    # Must be declared BEFORE the SPA fallback `location /` so it wins for
    # /api/* paths. (NGINX picks the longest matching prefix location, so
    # ordering is technically not significant for prefix matches, but the
    # ordering chosen here matches reader expectation.)
    location /api/ {
        proxy_pass         http://docupilot-api:8080/;
        proxy_http_version 1.1;

        # Standard reverse-proxy headers so the upstream sees the real
        # client identity rather than the NGINX intermediary.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # Reasonable defaults for an API gateway. Tune in later phases if
        # uploads or long-running operations need a higher ceiling.
        proxy_read_timeout    60s;
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;

        # Disable buffering for streaming-friendly responses (e.g., future
        # SSE / chunked endpoints). Cheap on memory; safe for JSON too.
        proxy_buffering off;
    }

    # ---- Long-cache for hashed static assets -----------------------------
    # Angular's production build emits content-hashed filenames
    # (e.g., main-XYZHASH.js, styles-XYZHASH.css). Those are immutable —
    # tell the browser so. index.html is intentionally NOT covered here
    # and falls through to the `location /` block below which serves it
    # without aggressive caching.
    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|eot|ico|svg|png|jpe?g|gif|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # ---- SPA fallback ----------------------------------------------------
    # The Angular router handles all in-app paths client-side. Any URI
    # that does not match a real file on disk gets index.html, so deep
    # links survive a page reload.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Hardening --------------------------------------------------------
    # Hide the nginx version banner from responses + error pages.
    server_tokens off;
}
